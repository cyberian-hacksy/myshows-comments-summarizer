<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>MyShows Comment Summarizer</title>
    <link rel="stylesheet" href="./popup.css">
</head>
<body>
<div class="popup">
    <header class="popup-head">
        <span id="title-icon"></span>
        <h1 class="popup-title">Comment Summarizer</h1>
    </header>

    <div class="mcs-field">
        <div class="label-row">
            <label class="mcs-field-label" for="openai-api-key">OpenAI API Key</label>
            <button id="test-key" type="button" class="mcs-btn mcs-btn-quiet mcs-btn-sm"
                    title="Check the key against the OpenAI API">Test</button>
        </div>
        <div class="key-wrap">
            <input type="password" id="openai-api-key" class="mcs-input" placeholder="sk-..."
                   autocomplete="off" spellcheck="false">
            <button id="key-reveal" type="button" class="mcs-btn-icon key-reveal"
                    title="Show key" aria-label="Show key"></button>
        </div>
    </div>

    <div class="mcs-field">
        <div class="label-row">
            <label class="mcs-field-label" id="model-label">Model</label>
            <button id="refresh-models" type="button" class="mcs-btn-icon"
                    title="Refresh model list from OpenAI" aria-label="Refresh model list">&#8635;</button>
        </div>
        <div id="model-dd"></div>
        <p id="model-description" class="mcs-field-hint"></p>
    </div>

    <div class="mcs-field">
        <label class="mcs-field-label" id="language-label">Summary Language</label>
        <div id="language-dd"></div>
    </div>

    <div class="mcs-field">
        <div class="label-row">
            <label class="mcs-field-label" for="temperature-slider">Temperature</label>
            <span id="temperature-value" class="temp-value">0.7</span>
        </div>
        <input type="range" id="temperature-slider" class="mcs-range" min="0" max="1" step="0.1" value="0.7"
               title="Ignored by reasoning models (gpt-5, o-series)">
        <p class="mcs-field-hint">Higher is more creative; reasoning models ignore it.</p>
    </div>

    <div class="mcs-field">
        <label class="mcs-field-label" for="max-tokens">Max Output Length</label>
        <select id="max-tokens" class="mcs-select">
            <option value="400">Short (about 150 words)</option>
            <option value="600" selected>Medium (about 250 words)</option>
            <option value="1000">Long (about 400 words)</option>
            <option value="1500">Very Long (about 600 words)</option>
        </select>
    </div>

    <div class="popup-foot">
        <button id="open-options" type="button" class="mcs-btn mcs-btn-quiet">Manage prompts…</button>
    </div>

    <div class="note">
        <p><strong>Changes save automatically.</strong> Your API key stays on this device —
            get one from the <a href="https://platform.openai.com/account/api-keys" target="_blank">OpenAI dashboard</a>.</p>
    </div>
</div>

<script type="module" src="./popup.ts"></script>
</body>
</html>
